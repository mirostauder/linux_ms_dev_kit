name: Makefile CI

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  build:

    runs-on: ubuntu-latest-arm

    steps:
    - uses: actions/checkout@v4

    - name: build
      run: |
        make ARCH=arm64 mrproper
        make ARCH=arm64 -j ubuntu_x1e_defconfig

        scripts/config --enable CONFIG_BLK_DEV_INITRD=y
        scripts/config --enable CONFIG_RD_GZIP
        scripts/config --enable CONFIG_RD_ZSTD

        scripts/config --disable SYSTEM_TRUSTED_KEYS
        scripts/config --disable SYSTEM_REVOCATION_KEYS
        
        VERS=$(make kernelversion)
        HASH=$(git rev-parse HEAD)
        export LOCALVERSION="-jg-g${HASH:0:12}"
        echo "Building kernel version: '${VERS}${LOCALVERSION}'"
        
        make ARCH=arm64 -j$(nproc)


